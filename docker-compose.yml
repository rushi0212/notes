services:
  backend:
    container_name: backend
    build: ./Backend
    image: rushi1501/notes-backend:latest
    ports:
      - "3000:3000"
    env_file:
      - ./Backend/.env
    depends_on:
      - mongo

  frontend:
    container_name: frontend
    build: ./Frontend
    image: rushi1501/notes-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - backend

  mongo:
    container_name: mongo
    image: mongo
    ports:
      - "27017:27017"
